<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Animated Button Collection</title>
</head>
<body>
    
    <div class="container">
        <h1>My animated button collection</h1>
        <div class="col">
            <div class="box">
                <div class="button button-1">
                    <p>Transition 1</p>
                </div>
            </div>
            <div class="box">
                <div class="button button-2">
                    <p>Transition 2</p>
                </div>
            </div>
            <div class="box">
                <div class="button button-3">
                    <p>Transition 3</p>
                </div>
            </div>
            <div class="box">
                <div class="button button-4">
                    <p>Transition 4</p>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="box box-ani">
                <div class="square-1">

                </div>
            </div>
            <div class="box box-ani">
                <div class="square-2">

                </div>
            </div>
            <div class="box box-ani">
                <div class="square-3">

                </div>
            </div>
            <div class="box box-ani">
                <div class="square-4"></div>
                <div class="square-5"></div>
            </div>
        </div>
        <div class="col">
            <div class="box box-ani">
                <div class="rotation-x">
                    <p>x axis</p>
                </div>
            </div>
            <div class="box box-ani">
                <div class="rotation-y">
                    <p>y axis</p>
                </div>
            </div>
            <div class="box box-ani">
                <div class="rotation-z">
                    <p>z axis</p>
                </div>
            </div>
            <div class="box box-ani">
                <div class="square-6"></div>
            </div>
        </div>
        <div class="col">
            <div class="box-2 box-ani">
                <div class="rectangle-1"></div>
            </div>
            <div class="box-2 box-ani">
                <div class="rectangle-2"></div>
            </div>
        </div>
    </div>
</body>
</html>
